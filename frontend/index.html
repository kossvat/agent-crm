<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Agent CRM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css?v=20260404a">
</head>
<body>
    <div id="offline-banner" class="offline-banner hidden">
        <span>📡 Connection lost</span>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <div id="app">
        <nav id="bottom-nav">
            <button class="nav-btn active" data-route="dashboard">
                <span class="nav-icon">📊</span>
                <span class="nav-label">Home</span>
            </button>
            <button class="nav-btn" data-route="kanban">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Board</span>
            </button>
            <button class="nav-btn" data-route="agents">
                <span class="nav-icon">🤖</span>
                <span class="nav-label">Agents</span>
            </button>
            <button class="nav-btn" data-route="crons">
                <span class="nav-icon">⏰</span>
                <span class="nav-label">Crons</span>
            </button>
            <button class="nav-btn" data-route="files">
                <span class="nav-icon">📁</span>
                <span class="nav-label">Files</span>
            </button>
            <button class="nav-btn" data-route="journal">
                <span class="nav-icon">📔</span>
                <span class="nav-label">Journal</span>
            </button>
            <button class="nav-btn" data-route="alerts">
                <span class="nav-icon">🔔</span>
                <span class="nav-label">Alerts</span>
            </button>
            <button class="nav-btn" data-route="admin" id="nav-admin" style="display:none">
                <span class="nav-icon">👑</span>
                <span class="nav-label">Admin</span>
            </button>
        </nav>

        <div class="app-content-wrapper">
            <header id="header">
                <h1 id="page-title">Dashboard</h1>
            </header>

            <main id="content">
                <div class="loading">Loading...</div>
            </main>
        </div>
    </div>

    <!-- Onboarding Wizard -->
    <div id="onboarding-overlay" class="onboarding-overlay hidden">
        <div id="onboarding-content" class="onboarding-content"></div>
    </div>

    <!-- Task Preview Modal -->
    <div id="preview-overlay" class="modal-overlay hidden">
        <div class="modal preview-modal">
            <div class="modal-header">
                <h2 id="preview-title">Task Details</h2>
                <button class="modal-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="preview-body" id="preview-body"></div>
            <div class="preview-actions">
                <button class="btn btn-primary preview-edit-btn" id="preview-edit-btn" onclick="previewToEdit()">✏️ Edit</button>
                <button class="btn btn-close-preview" onclick="closePreview()">Close</button>
            </div>
        </div>
    </div>

    <!-- Task Modal -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">New Task</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="task-form" class="modal-body">
                <input type="hidden" id="task-id">
                <div class="field">
                    <label for="task-title">Title</label>
                    <input type="text" id="task-title" required placeholder="Task title...">
                </div>
                <div class="field">
                    <label for="task-desc">Description</label>
                    <textarea id="task-desc" rows="3" placeholder="Details..."></textarea>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="task-status">Status</label>
                        <select id="task-status">
                            <option value="todo">Todo</option>
                            <option value="in_progress">In Progress</option>
                            <option value="done">Done</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="task-priority">Priority</label>
                        <select id="task-priority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="task-agent">Agent</label>
                        <select id="task-agent">
                            <option value="">Unassigned</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="task-category">Category</label>
                        <select id="task-category">
                            <option value="">None</option>
                            <option value="business">💼 Business</option>
                            <option value="content">📝 Content</option>
                            <option value="projects">🚀 Projects</option>
                            <option value="system">⚙️ System</option>
                            <option value="education">📚 Education</option>
                            <option value="personal">👤 Personal</option>
                        </select>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="task-deadline">📅 Deadline</label>
                        <input type="datetime-local" id="task-deadline" placeholder="Select date & time">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <button type="button" class="btn btn-danger" id="btn-delete-task" style="display:none" onclick="deleteCurrentTask()">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js?v=20260404a"></script>
</body>
</html>
